workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Generate icons
        script: dart run flutter_launcher_icons
      - name: Download sing-box
        script: |
          mkdir -p android/app/src/main/assets
          SBVER="1.12.3"
          URL="https://github.com/SagerNet/sing-box/releases/download/v${SBVER}/sing-box-${SBVER}-android-arm64-v8a.tar.gz"
          echo "Downloading from: $URL"
          wget --no-check-certificate -O /tmp/sb.tar.gz "$URL"
          echo "File size: $(wc -c < /tmp/sb.tar.gz)"
          echo "File type: $(file /tmp/sb.tar.gz)"
          tar -xzf /tmp/sb.tar.gz -C /tmp/
          BINARY=$(find /tmp -name "sing-box" -type f 2>/dev/null | head -1)
          echo "Found binary: $BINARY"
          cp "$BINARY" android/app/src/main/assets/sing-box-arm64
          cp "$BINARY" android/app/src/main/assets/sing-box-arm
          echo "Done: $(ls -la android/app/src/main/assets/)"
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Generate icons
        script: dart run flutter_launcher_icons
      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign
          find . -name "Runner.app" -type d
          APP_PATH=$(find . -name "Runner.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r sweetie_vpn.ipa Payload/
    artifacts:
      - sweetie_vpn.ipa
