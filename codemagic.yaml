workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Generate icons
        script: dart run flutter_launcher_icons
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Generate icons
        script: dart run flutter_launcher_icons
      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign
          find . -name "Runner.app" -type d
          APP_PATH=$(find . -name "Runner.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r sweetie_vpn.ipa Payload/
    artifacts:
      - sweetie_vpn.ipa
