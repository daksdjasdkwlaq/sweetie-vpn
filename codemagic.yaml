workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Generate icons
        script: dart run flutter_launcher_icons
      - name: Download sing-box
        script: |
          mkdir -p android/app/src/main/assets
          curl -L "https://github.com/SagerNet/sing-box/releases/download/v1.9.0/sing-box-1.9.0-android-arm64.tar.gz" -o /tmp/sb-arm64.tar.gz
          tar -xzf /tmp/sb-arm64.tar.gz -C /tmp/
          cp /tmp/sing-box-1.9.0-android-arm64/sing-box android/app/src/main/assets/sing-box-arm64
          curl -L "https://github.com/SagerNet/sing-box/releases/download/v1.9.0/sing-box-1.9.0-android-arm.tar.gz" -o /tmp/sb-arm.tar.gz
          tar -xzf /tmp/sb-arm.tar.gz -C /tmp/
          cp /tmp/sing-box-1.9.0-android-arm/sing-box android/app/src/main/assets/sing-box-arm
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Generate icons
        script: dart run flutter_launcher_icons
      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign
          find . -name "Runner.app" -type d
          APP_PATH=$(find . -name "Runner.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r sweetie_vpn.ipa Payload/
    artifacts:
      - sweetie_vpn.ipa
